server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${HOST}
    username: ${DB_USER:restaurante_user}
    password: ${DB_PASSWORD:restaurante_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS}
  inactivity-minutes: ${JWT_INACTIVITY_MINUTES}